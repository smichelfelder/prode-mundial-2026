<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f5f5f0;
    --surface: #ffffff;
    --surface2:#f0efea;
    --border:  #d8d6cf;
    --text:    #111111;
    --muted:   #777777;
    /* FWC 2026 signature neons – darkened for light-bg legibility */
    --coral:   #D6193C;
    --teal:    #007A6E;
    --violet:  #7B2CC0;
    --lime:    #5E9B00;
    /* bright neon versions for borders/shadows/backgrounds */
    --lime-neon:  #AAFF00;
    --teal-neon:  #00E5CC;
    --coral-neon: #FF4D6D;
    --violet-neon:#A855F7;
    /* group color aliases for JS interpolation */
    --gc0: #5E9B00;
    --gc1: #007A6E;
    --gc2: #D6193C;
    --gc3: #7B2CC0;
    --gold:    #B07800;
    /* scoring */
    --exact:   var(--lime);
    --result:  var(--teal);
    --miss:    var(--coral);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background-color: #e8e7e1;
    background-image: repeating-linear-gradient(
      -45deg,
      transparent 0, transparent 30px,
      rgba(0,0,0,0.022) 30px, rgba(0,0,0,0.022) 31px
    );
    color: var(--text);
    font-family: 'Barlow', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── BACKGROUND DECO ── */
  .page-deco {
    position: fixed; inset: 0; z-index: 0;
    pointer-events: none; overflow: hidden;
  }
  .page-deco::before {
    content: '26';
    position: absolute; bottom: -80px; right: -20px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 55vw; font-weight: 900; line-height: 1;
    color: rgba(0,0,0,0.04); letter-spacing: -10px;
    user-select: none;
  }
  .page-deco::after {
    content: '';
    position: absolute; bottom: 0; left: 0; right: 0; height: 5px;
    background: linear-gradient(90deg, #AAFF00 0%, #00E5CC 33%, #FF4D6D 66%, #A855F7 100%);
  }

  header { position: relative; z-index: 2; }
  .container { position: relative; z-index: 1; }

  /* ── HEADER ── */
  header {
    background: #000;
    border-bottom: 4px solid var(--lime-neon);
    padding: 0 24px;
    display: flex; align-items: stretch; gap: 0;
    position: relative; overflow: hidden;
  }
  .header-deco {
    position: absolute; right: 0; top: -10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14rem; font-weight: 900; line-height: 1;
    color: #ffffff06; pointer-events: none; user-select: none;
    letter-spacing: -8px;
  }
  .header-left {
    display: flex; align-items: center; gap: 20px;
    padding: 20px 0; flex: 1;
  }
  .header-trophy { font-size: 2.4rem; }
  .header-title { }
  .header-title h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem; font-weight: 900; letter-spacing: 2px;
    text-transform: uppercase; line-height: 1; color: #fff;
  }
  .header-title h1 .wc { color: var(--lime-neon); }
  .header-title p {
    font-size: 0.78rem; color: #666; margin-top: 4px;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .sync-area {
    display: flex; flex-direction: column; align-items: flex-end;
    justify-content: center; gap: 5px; padding: 20px 0 20px 24px;
    position: relative; z-index: 1;
  }
  .sync-btn {
    padding: 9px 18px;
    background: #000; border: 2px solid var(--teal-neon); border-radius: 0;
    color: var(--teal-neon); font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 0.9rem; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
    box-shadow: 3px 3px 0 var(--teal-neon);
    transition: box-shadow 0.15s, transform 0.15s;
    white-space: nowrap;
  }
  .sync-btn:hover { box-shadow: 5px 5px 0 var(--teal-neon); transform: translate(-1px,-1px); }
  .sync-btn:active { box-shadow: 1px 1px 0 var(--teal-neon); transform: translate(2px,2px); }
  .sync-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .sync-status { font-size: 0.7rem; color: #555; letter-spacing: 1px; }

  .header-btns { display: flex; gap: 8px; align-items: center; }
  .cargar-btn {
    padding: 9px 18px;
    background: var(--lime-neon); border: 2px solid var(--lime-neon); border-radius: 0;
    color: #000; font-family: 'Barlow Condensed', sans-serif;
    font-weight: 800; font-size: 0.9rem; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
    box-shadow: 3px 3px 0 #000;
    transition: box-shadow 0.15s, transform 0.15s;
    white-space: nowrap; text-decoration: none; display: inline-block;
  }
  .cargar-btn:hover { box-shadow: 5px 5px 0 #000; transform: translate(-1px,-1px); }
  .cargar-btn:active { box-shadow: 1px 1px 0 #000; transform: translate(2px,2px); }

  /* Vista "Cargar" — esconde lo principal y muestra solo el load tab */
  body.view-load .featured-bar,
  body.view-load .tabs,
  body.view-load #tab-standings,
  body.view-load #tab-matches,
  body.view-load #tab-players { display: none !important; }
  body.view-load #tab-load { display: block !important; }
  body:not(.view-load) #tab-load { display: none !important; }

  .back-link {
    display: inline-flex; align-items: center; gap: 6px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem; font-weight: 800; letter-spacing: 1.5px;
    text-transform: uppercase; color: var(--muted);
    cursor: pointer; user-select: none;
    margin-bottom: 18px; padding: 8px 0;
    background: none; border: none; text-decoration: none;
  }
  .back-link:hover { color: var(--text); }
  .page-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem; font-weight: 900; letter-spacing: 3px;
    text-transform: uppercase; margin-bottom: 18px;
    padding-bottom: 10px; border-bottom: 3px solid var(--lime-neon);
  }

  /* ── CONTAINER / TABS ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 28px 16px; }

  .tabs { display: flex; gap: 2px; margin-bottom: 28px; border-bottom: 2px solid var(--border); }
  .tab-btn {
    padding: 11px 24px;
    background: none; border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
    cursor: pointer; border-bottom: 4px solid transparent;
    margin-bottom: -2px; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--lime-neon); }
  .tab-btn:hover:not(.active) { color: #333; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── LEADERBOARD ── */
  .leaderboard { background: var(--surface); border: 2px solid var(--border); border-radius: 0; overflow: hidden; box-shadow: 4px 4px 0 rgba(0,0,0,0.08); }
  .leaderboard-header {
    padding: 12px 20px;
    background: #111;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; font-weight: 700; color: #666;
    text-transform: uppercase; letter-spacing: 2px;
    display: grid; grid-template-columns: 52px 1fr repeat(4, 90px); gap: 8px; align-items: center;
    border-bottom: 2px solid var(--border);
  }
  .lb-row {
    display: grid; grid-template-columns: 52px 1fr repeat(4, 90px); gap: 8px;
    align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border);
    transition: background 0.1s; position: relative;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: var(--surface2); }
  .lb-row.rank-1 { border-left: 5px solid var(--lime-neon); background: rgba(170,255,0,0.05); }
  .lb-row.rank-2 { border-left: 5px solid var(--teal-neon); background: rgba(0,229,204,0.04); }
  .lb-row.rank-3 { border-left: 5px solid var(--coral-neon); background: rgba(255,77,109,0.04); }
  .lb-row.rank-other { border-left: 4px solid var(--border); }

  .lb-rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem; font-weight: 900; color: var(--muted); text-align: center;
  }
  .lb-row.rank-1 .lb-rank { color: var(--lime); }
  .lb-row.rank-2 .lb-rank { color: var(--teal); }
  .lb-row.rank-3 .lb-rank { color: var(--coral); }

  .lb-name-wrap {}
  .lb-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.3rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
  }
  .lb-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem; font-weight: 900; color: var(--lime); text-align: center;
  }
  .lb-live-pts {
    font-size: 0.8rem; font-weight: 800; color: #e8000d;
    margin-left: 3px; vertical-align: super;
    animation: live-pulse 1.4s ease-in-out infinite;
  }
  .lb-exact { color: var(--exact); font-weight: 700; text-align: center; font-size: 1rem; }
  .lb-result { color: var(--result); font-weight: 700; text-align: center; font-size: 1rem; }
  .lb-played { color: var(--muted); font-weight: 600; text-align: center; font-size: 0.9rem; }

  .progress-bar { height: 3px; background: var(--border); margin-top: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--lime-neon); transition: width 0.5s; }

  /* ── GROUPS ── */
  .group-section { margin-bottom: 36px; }
  .group-title { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .group-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 900; letter-spacing: 1px;
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    border: 2px solid; border-radius: 0;
  }
  .group-title h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.2rem; font-weight: 900; letter-spacing: 3px; text-transform: uppercase;
  }

  /* Group colors cycling through the 4 neons — solid filled badges */
  .gc-0 { background: var(--lime-neon); color: #000; border-color: var(--lime-neon); box-shadow: 3px 3px 0 #000; }
  .gc-1 { background: var(--teal-neon); color: #000; border-color: var(--teal-neon); box-shadow: 3px 3px 0 #000; }
  .gc-2 { background: var(--coral-neon); color: #fff; border-color: var(--coral-neon); box-shadow: 3px 3px 0 #000; }
  .gc-3 { background: var(--violet-neon); color: #fff; border-color: var(--violet-neon); box-shadow: 3px 3px 0 #000; }
  .gh-0 { color: var(--lime); }
  .gh-1 { color: var(--teal); }
  .gh-2 { color: var(--coral); }
  .gh-3 { color: var(--violet); }

  /* ── MATCH CARDS ── */
  .match-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 0; margin-bottom: 6px; overflow: hidden;
    box-shadow: 2px 2px 0 rgba(0,0,0,0.07);
    transition: box-shadow 0.15s, transform 0.15s;
  }
  .match-card:hover {
    box-shadow: 4px 4px 0 rgba(0,0,0,0.12);
    transform: translate(-1px, -1px);
  }
  .match-header {
    display: flex; align-items: center;
    gap: 8px; padding: 11px 14px; cursor: pointer;
    transition: background 0.1s;
  }
  .match-header:hover { background: var(--surface2); }
  .match-num {
    color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; font-weight: 700; min-width: 24px; text-align: center;
  }
  .team-home {
    flex: 1; text-align: right;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .team-away {
    flex: 1; text-align: left;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .score-area { display: flex; align-items: center; gap: 6px; justify-content: center; margin: 0 8px; }
  .score-input {
    width: 40px; height: 34px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 1rem; font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    text-align: center; outline: none; border-radius: 0;
    transition: border-color 0.15s;
  }
  .score-input:focus { border-color: var(--lime-neon); }
  .score-sep { color: var(--muted); font-weight: 900; font-size: 1.1rem; }
  .match-result-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.3rem; font-weight: 900; color: #fff;
    text-align: center; min-width: 70px; letter-spacing: 2px;
    margin: 0 8px; background: #111;
    padding: 4px 14px;
  }
  .match-meta { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .match-status {
    padding: 3px 8px; font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  }
  .match-status.pending { border: 1px solid var(--border); color: var(--muted); }
  .match-status.played { background: var(--lime-neon); border-color: var(--lime-neon); color: #000; font-weight: 800; }
  .match-status.live {
    background: #e8000d; border-color: #e8000d; color: #fff; font-weight: 800;
    animation: live-pulse 1.4s ease-in-out infinite;
  }
  @keyframes live-pulse { 0%,100%{opacity:1} 50%{opacity:0.55} }
  .match-result-display.is-live { background: #1a0000; color: #ff7070; animation: live-pulse 1.4s ease-in-out infinite; }
  .chevron { color: var(--muted); font-size: 0.75rem; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  /* ── PREDICTIONS PANEL ── */
  .predictions-panel {
    display: none; padding: 10px 14px 12px;
    border-top: 1px solid var(--border); background: var(--surface2);
  }
  .predictions-panel.open { display: block; }
  .pred-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
  .pred-cell {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 0; padding: 8px 10px; text-align: center; transition: border-color 0.15s;
  }
  .pred-player {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px;
  }
  .pred-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 800; letter-spacing: 2px;
  }
  .pred-pts { font-size: 0.65rem; margin-top: 3px; font-weight: 700; letter-spacing: 0.5px; }

  .pts-2 { border-color: var(--lime-neon) !important; box-shadow: 2px 2px 0 var(--lime-neon); background: #f5ffe0; }
  .pts-2 .pred-score { color: var(--lime); }
  .pts-2 .pred-pts { color: var(--lime); }
  .pts-1 { border-color: var(--teal-neon) !important; box-shadow: 2px 2px 0 var(--teal-neon); background: #e8fdf9; }
  .pts-1 .pred-score { color: var(--teal); }
  .pts-1 .pred-pts { color: var(--teal); }
  .pts-0 .pred-pts { color: var(--coral); }

  /* ── FEATURED MATCH BAR ── */
  .featured-bar {
    background: var(--surface); border-bottom: 2px solid var(--border);
    position: relative; z-index: 2;
    box-shadow: 0 2px 8px rgba(0,0,0,0.08);
  }
  .fm-inner {
    max-width: 1400px; margin: 0 auto; padding: 10px 20px;
    display: flex; align-items: center; gap: 14px;
    cursor: pointer; user-select: none;
    transition: background 0.15s;
  }
  .fm-inner:hover { background: var(--surface2); }
  .fm-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; color: var(--muted);
    white-space: nowrap; min-width: 60px;
  }
  .fm-label.is-live {
    color: #e8000d; animation: live-pulse 1.4s ease-in-out infinite;
  }
  .fm-teams {
    display: flex; align-items: center; gap: 10px; flex: 1;
    justify-content: center;
  }
  .fm-home {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; text-align: right; flex: 1;
  }
  .fm-away {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 1px; text-align: left; flex: 1;
  }
  .fm-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.3rem; font-weight: 900; letter-spacing: 3px;
    background: #111; color: #fff; padding: 3px 14px;
    white-space: nowrap;
  }
  .fm-score.is-live {
    background: #1a0000; color: #ff7070;
    animation: live-pulse 1.4s ease-in-out infinite;
  }
  .fm-time {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.78rem; font-weight: 700; color: var(--muted);
    text-align: center; white-space: nowrap; letter-spacing: 0.5px;
    text-transform: uppercase;
  }
  .fm-group {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 800; letter-spacing: 2px;
    color: var(--muted); white-space: nowrap;
  }
  .fm-chevron {
    color: var(--muted); font-size: 0.75rem;
    transition: transform 0.2s; flex-shrink: 0;
  }
  .fm-chevron.open { transform: rotate(180deg); }

  .fm-preds-panel {
    display: none; border-top: 1px solid var(--border);
    background: var(--surface2);
    padding: 10px 20px 12px;
  }
  .fm-preds-panel.open { display: block; }
  .fm-pred-grid {
    max-width: 1400px; margin: 0 auto;
    display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 6px;
  }
  .fm-pred-cell {
    background: var(--surface); border: 1px solid var(--border);
    padding: 7px 10px; text-align: center;
  }
  .fm-pred-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.62rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px;
  }
  .fm-pred-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 800; letter-spacing: 2px; color: var(--text);
  }

  @media (max-width: 768px) {
    .fm-inner { padding: 8px 12px; gap: 8px; }
    .fm-home, .fm-away { font-size: 0.78rem; }
    .fm-score { font-size: 1.05rem; padding: 2px 10px; }
    .fm-group { display: none; }
    .fm-label { min-width: 44px; font-size: 0.58rem; }
  }

  /* ── GROUP STANDINGS ── */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
    gap: 20px;
  }
  .gs-card {
    background: var(--surface); border: 1px solid var(--border);
    box-shadow: 3px 3px 0 rgba(0,0,0,0.08); overflow: hidden;
  }
  .gs-header {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 14px;
    background: #111;
  }
  .gs-title {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem; font-weight: 800; letter-spacing: 3px;
    text-transform: uppercase; color: #888;
  }
  .gs-cols {
    display: grid;
    grid-template-columns: 20px 1fr repeat(8, 34px);
    gap: 0; padding: 6px 14px;
    background: var(--surface2);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px;
    border-bottom: 1px solid var(--border);
  }
  .gs-cols > div { text-align: center; }
  .gs-cols > div:nth-child(2) { text-align: left; }
  .gs-row {
    display: grid;
    grid-template-columns: 20px 1fr repeat(8, 34px);
    gap: 0; padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    align-items: center; transition: background 0.1s;
  }
  .gs-row:last-child { border-bottom: none; }
  .gs-row:hover { background: var(--surface2); }
  .gs-row.qualify { border-left: 3px solid var(--lime-neon); }
  .gs-row.third { border-left: 3px solid var(--teal-neon); }
  .gs-row.out { border-left: 3px solid var(--border); }
  .gs-pos {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; font-weight: 700; color: var(--muted); text-align: center;
  }
  .gs-team {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.88rem; font-weight: 800; text-transform: uppercase;
    letter-spacing: 0.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .gs-num {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem; font-weight: 600; color: var(--muted); text-align: center;
  }
  .gs-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.95rem; font-weight: 900; text-align: center; color: var(--text);
  }
  .gs-row.qualify .gs-pts { color: var(--lime); }
  .gs-live-pts {
    font-size: 0.62rem; font-weight: 800; color: #e8000d;

function formatMatchDate(matchNum) {
  const iso = MATCH_DATES[matchNum];
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('es-ES', {
    timeZone: 'Europe/Madrid',
    weekday: 'short', day: 'numeric', month: 'short',
    hour: '2-digit', minute: '2-digit'
  });
}

function getPrediction(player, m) {
  const upreds = userPredictions[player];
  if (upreds && upreds[m.match]) return upreds[m.match];
  if (m.predictions && m.predictions[player]) return m.predictions[player];
  return null;
}

async function fetchPredictions() {
  try {
    const res = await fetch('/api/predictions');
    if (!res.ok) return;
    const data = await res.json();
    userPredictions = data.predictions || {};
  } catch(e) {
    console.warn('No se pudieron cargar pronósticos remotos:', e.message);
  }
}

function getResult(matchNum) {
  return results[matchNum] || null;
}

function getOutcome(h, a) {
  if (h > a) return 'H';
  if (a > h) return 'A';
  return 'D';
}

function calcPoints(pred, actual) {
  if (!actual) return null;
  if (pred.home === actual.home && pred.away === actual.away) return 2;
  if (getOutcome(pred.home, pred.away) === getOutcome(actual.home, actual.away)) return 1;
  return 0;
}

function calcPlayerStats(player) {
  let pts = 0, exact = 0, result = 0, played = 0, livePts = 0;
  for (const m of ALL_MATCHES) {
    const actual = getResult(m.match);
    if (!actual) continue;
    const pred = getPrediction(player, m);
    if (!pred) continue;
    const p = calcPoints(pred, actual);
    if (actual.live) {
      // Resultado parcial: no se suma al total confirmado, se muestra aparte
      livePts += p;
      continue;
    }
    played++;
    pts += p;
    if (p === 2) exact++;
    else if (p === 1) result++;
  }
  return { pts, exact, result, played, livePts };
}

const GROUP_COLOR = { A:0, B:1, C:2, D:3, E:0, F:1, G:2, H:3, I:0, J:1, K:2, L:3 };

function renderStandings() {
  const stats = PLAYERS.map(p => ({ name: p, ...calcPlayerStats(p) }));
  stats.sort((a, b) => b.pts - a.pts || b.exact - a.exact || b.result - a.result);

  const body = document.getElementById('lb-body');
  body.innerHTML = stats.map((s, i) => {
    const rowCls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
    const rankLabel = i === 0 ? '01' : i === 1 ? '02' : i === 2 ? '03' : String(i+1).padStart(2,'0');
    const pct = ALL_MATCHES.length > 0 ? (s.played / ALL_MATCHES.length * 100).toFixed(0) : 0;
    return `<div class="lb-row ${rowCls}">
      <div class="lb-rank">${rankLabel}</div>
      <div class="lb-name-wrap">
        <div class="lb-name">${s.name}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="lb-pts">${s.pts}${s.livePts > 0 ? `<span class="lb-live-pts">+${s.livePts}</span>` : ''}</div>
      <div class="lb-exact">${s.exact}</div>
      <div class="lb-result">${s.result}</div>
      <div class="lb-played h-played">${s.played}/${ALL_MATCHES.length}</div>
    </div>`;
  }).join('');
}

  { key: 'QF',     label: 'Cuartos de Final',         matches: () => KNOCKOUT_MATCHES.filter(m => m.round === 'QF') },
  { key: 'SF',     label: 'Semifinales',              matches: () => KNOCKOUT_MATCHES.filter(m => m.round === 'SF') },
  { key: '3RD',    label: 'Tercer Puesto',            matches: () => KNOCKOUT_MATCHES.filter(m => m.round === '3RD') },
  { key: 'FINAL',  label: 'Final',                    matches: () => KNOCKOUT_MATCHES.filter(m => m.round === 'FINAL') },
];

// Determinar fase abierta por defecto: la del próximo partido (o R32 si no hay)
function defaultExpandedPhase() {
  const featured = getFeaturedMatch();
  if (!featured) return 'R32';
  const m = featured.match;
  return m.group ? 'groups' : m.round;
}
let expandedPhases = null; // se inicializa en el primer render

function renderGroupFilters() {
  const bar = document.getElementById('group-filters');
  if (!bar) return;
  bar.innerHTML = `<button class="filter-btn ${activeGroup==='all'?'active':''}" onclick="filterGroup('all',this)">Todos</button>` +
    GROUPS.map(g => `<button class="filter-btn ${activeGroup===g?'active':''}" onclick="filterGroup('${g}',this)">Grupo ${g}</button>`).join('');
}

function filterGroup(g, btn) {
  activeGroup = g;
  renderGroupFilters();
  renderMatches();
}

function togglePhase(key) {
  expandedPhases[key] = !expandedPhases[key];
  renderMatchesAccordion();
}

function renderPhaseBodyByGroup(phaseMatches) {
  const groups = activeGroup === 'all' ? GROUPS : [activeGroup];
  return groups.map(g => {
    const ci = GROUP_COLOR[g];
    const gMatches = phaseMatches.filter(m => m.group === g);
    if (gMatches.length === 0) return '';
    return `<div class="group-section">
      <div class="group-title">
        <div class="group-badge gc-${ci}">${g}</div>
        <h2 class="gh-${ci}">GRUPO ${g}</h2>
      </div>
      ${gMatches.map(m => renderMatchCard(m, ci)).join('')}
    </div>`;
  }).join('');
}

function renderPhaseBodyByDay(phaseMatches) {
  const sorted = [...phaseMatches].sort((a, b) => {
    const da = MATCH_DATES[a.match] ? new Date(MATCH_DATES[a.match]) : new Date(0);
    const db = MATCH_DATES[b.match] ? new Date(MATCH_DATES[b.match]) : new Date(0);
    return da - db;
  });
  const byDay = {};
  const dayOrder = [];
  for (const m of sorted) {
    const iso = MATCH_DATES[m.match];
    const d = iso ? new Date(iso) : null;
    const dayKey = d
      ? d.toLocaleDateString('es-ES', { timeZone: 'Europe/Madrid', weekday: 'long', day: 'numeric', month: 'long' })
      : 'Sin fecha';
    if (!byDay[dayKey]) { byDay[dayKey] = []; dayOrder.push(dayKey); }
    byDay[dayKey].push(m);
  }
  return dayOrder.map(day => `<div class="group-section">
      <div class="chrono-day"><h2>${day}</h2></div>
      ${byDay[day].map(m => renderMatchCard(m, m.group ? GROUP_COLOR[m.group] : 0)).join('')}
    </div>`).join('');
}

function renderMatchesAccordion() {
  const container = document.getElementById('matches-container');
  if (!container) return;
  if (!expandedPhases) expandedPhases = { [defaultExpandedPhase()]: true };

  // Filtros de grupo: solo visibles si la fase de grupos está abierta y el sub-tab es "Por Grupo"
  const filtersWrap = document.getElementById('group-filters-wrap');
  if (filtersWrap) {
    const showFilters = activeMatchView === 'groups' && expandedPhases.groups;
    filtersWrap.style.display = showFilters ? '' : 'none';
  }

  container.innerHTML = PHASES.map(phase => {
    const phaseMatches = phase.matches();
    const open = !!expandedPhases[phase.key];
    const stats = phaseMatches.reduce((acc, m) => {
      if (getResult(m.match)) acc.played++;
      return acc;
    }, { played: 0 });
    const progress = phaseMatches.length > 0
      ? `<span class="phase-progress">${stats.played}/${phaseMatches.length}</span>`
      : '';

    let body;
    if (phase.hasGroups && activeMatchView === 'groups') {
      body = renderPhaseBodyByGroup(phaseMatches);
    } else {
      body = renderPhaseBodyByDay(phaseMatches);
    }

    return `<div class="phase-section ${open ? 'open' : ''}">
      <div class="phase-header" onclick="togglePhase('${phase.key}')">
        <span class="phase-title">${phase.label}</span>
        ${progress}
        <span class="phase-count">${phaseMatches.length}</span>
        <span class="phase-chevron">▼</span>
      </div>
      <div class="phase-body">${body}</div>
    </div>`;
  }).join('');
}

function renderMatches() { renderMatchesAccordion(); }
function renderChronoMatches() { renderMatchesAccordion(); }

function renderMatchCard(m, ci) {
  const actual = getResult(m.match);
  const isPlayed = !!actual;
  const isLive = isPlayed && actual.live;
  if (typeof ci !== 'number') ci = 0;

  const scoreBlock = isPlayed
    ? `<div class="match-result-display${isLive ? ' is-live' : ''}">${actual.home} – ${actual.away}</div>`
    : `<div class="score-area">
        <input class="score-input" type="number" min="0" max="20" placeholder="–"
          id="h${m.match}" onclick="event.stopPropagation()" onchange="saveScore(${m.match})">
        <span class="score-sep">–</span>
        <input class="score-input" type="number" min="0" max="20" placeholder="–"
          id="a${m.match}" onclick="event.stopPropagation()" onchange="saveScore(${m.match})">
      </div>`;

  const predRows = PLAYERS.map(p => {
    const pred = getPrediction(p, m);
    if (!pred) {
      return `<div class="pred-cell">
        <div class="pred-player">${p}</div>
        <div class="pred-score" style="color:var(--muted)">–</div>
        <div class="pred-pts"></div>
      </div>`;
    }
    const pts = isLive ? null : calcPoints(pred, actual);
    const cls = pts === null ? '' : pts === 2 ? 'pts-2' : pts === 1 ? 'pts-1' : 'pts-0';
    const lbl = pts === null ? '' : pts === 2 ? '+2 EXACTO' : pts === 1 ? '+1 RESULT.' : '0 PTS';
    return `<div class="pred-cell ${cls}">
      <div class="pred-player">${p}</div>
      <div class="pred-score">${pred.home}–${pred.away}</div>
      <div class="pred-pts">${lbl}</div>
    </div>`;
  }).join('');

  const statusCls = isLive ? 'live' : isPlayed ? 'played' : 'pending';
  const statusTxt = isLive ? `🔴 ${actual.clock || 'EN VIVO'}` : isPlayed ? '✓ JUGADO' : 'PENDIENTE';
  const whenStr = !isPlayed ? formatMatchDate(m.match) : '';

  return `<div class="match-card" id="mc${m.match}" style="border-left: 3px solid var(--gc${ci})">
    <div class="match-header" onclick="togglePreds(${m.match})">
      <div class="match-num">${m.match}</div>
      <div class="team-home">${teamFlag(m.home)}${m.home}</div>
      ${scoreBlock}
      <div class="team-away">${teamFlag(m.away)}${m.away}</div>
      <div class="match-meta">
        <span class="match-status ${statusCls}">${statusTxt}</span>
        <span class="chevron" id="chev${m.match}">▼</span>
      </div>
    </div>
    ${whenStr ? `<div class="match-date-row">📅 ${whenStr}</div>` : ''}
    <div class="predictions-panel" id="pp${m.match}">
      <div class="pred-grid">${predRows}</div>
    </div>
  </div>`;
}

function togglePreds(matchNum) {
  const panel = document.getElementById(`pp${matchNum}`);
  const chev = document.getElementById(`chev${matchNum}`);
  const open = panel.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function saveScore(matchNum) {
  const hEl = document.getElementById(`h${matchNum}`);
  const aEl = document.getElementById(`a${matchNum}`);
  if (!hEl || !aEl) return;
  const h = hEl.value.trim();
  const a = aEl.value.trim();
  if (h !== '' && a !== '') {
    results[matchNum] = { home: parseInt(h), away: parseInt(a) };
  } else {
    delete results[matchNum];
  }
  saveResults(results);
  refresh();
}

// --- GROUP STANDINGS ---
function calcGroupStandings(group) {
  const teams = {};
  const gMatches = MATCHES.filter(m => m.group === group);
  for (const m of gMatches) {
    if (!teams[m.home]) teams[m.home] = { pj:0, g:0, e:0, p:0, gf:0, ga:0, livePts:0 };
    if (!teams[m.away]) teams[m.away] = { pj:0, g:0, e:0, p:0, gf:0, ga:0, livePts:0 };
  }
  for (const m of gMatches) {
    const r = getResult(m.match);
    if (!r) continue;
    const h = teams[m.home], a = teams[m.away];
    if (r.live) {
      // Resultado parcial: no se suma a la tabla confirmada, se muestra como provisional
      if (r.home > r.away) { h.livePts += 3; }
      else if (r.away > r.home) { a.livePts += 3; }
      else { h.livePts += 1; a.livePts += 1; }
      continue;
    }
    h.pj++; a.pj++;
    h.gf += r.home; h.ga += r.away;
    a.gf += r.away; a.ga += r.home;
    if (r.home > r.away) { h.g++; a.p++; }
    else if (r.away > r.home) { a.g++; h.p++; }
    else { h.e++; a.e++; }
  }
  return Object.entries(teams)
    .map(([name, s]) => ({ name, ...s, gd: s.gf - s.ga, pts: s.g * 3 + s.e }))
    .sort((a, b) => b.pts - a.pts || b.gd - a.gd || b.gf - a.gf || a.name.localeCompare(b.name));
}

function renderGroupStandings() {
  const container = document.getElementById('groups-container');
  container.innerHTML = `<div class="groups-grid">${GROUPS.map(g => {
    const ci = GROUP_COLOR[g];

    const rowsHtml = rows.map((t, i) => {
      const cls = i < 2 ? 'qualify' : i === 2 ? 'third' : 'out';
      const gdStr = t.gd > 0 ? `+${t.gd}` : `${t.gd}`;

      </div>`;
    }).join('');
    return `<div class="gs-card">
      <div class="gs-header">
        <div class="group-badge gc-${ci}">${g}</div>
        <div class="gs-title">Grupo ${g}</div>
      </div>

  }).join('')}</div>`;

// --- FEATURED MATCH BAR ---
let featuredOpen = false;

function getFeaturedMatch() {
  // 1. Partido en vivo tiene prioridad
  for (const m of ALL_MATCHES) {
    const r = getResult(m.match);
    if (r && r.live) return { match: m, isLive: true, actual: r };
  }
  // 2. Próximo partido sin resultado y con equipos definidos, ordenado por fecha
  const upcoming = ALL_MATCHES
    .filter(m => !getResult(m.match) && MATCH_DATES[m.match] && m.home !== 'TBD' && m.away !== 'TBD')
    .sort((a, b) => new Date(MATCH_DATES[a.match]) - new Date(MATCH_DATES[b.match]));
  if (upcoming.length > 0) return { match: upcoming[0], isLive: false, actual: null };
  return null;
}

function renderFeaturedMatch() {
  const bar = document.getElementById('featured-bar');
  const featured = getFeaturedMatch();
  if (!featured) { bar.style.display = 'none'; return; }
  bar.style.display = '';

  const { match: m, isLive, actual } = featured;

  // Label
  const labelEl = document.getElementById('fm-label');
  labelEl.className = 'fm-label' + (isLive ? ' is-live' : '');
  labelEl.textContent = isLive ? '🔴 EN VIVO' : 'PRÓXIMO';

  // Teams + score/time
  const teamsEl = document.getElementById('fm-teams');
  let middleHtml;
  if (isLive) {
    middleHtml = `<span class="fm-score is-live">${actual.home} – ${actual.away}</span>`;
  } else {
    const dateStr = formatMatchDate(m.match);
    middleHtml = `<span class="fm-time">${dateStr}</span>`;
  }
  teamsEl.innerHTML = `
    <span class="fm-home">${teamFlag(m.home)}${m.home}</span>
    ${middleHtml}
    <span class="fm-away">${teamFlag(m.away)}${m.away}</span>`;

  // Group / round label
  const groupLbl = m.group ? `GRUPO ${m.group}` : (ROUND_LABELS[m.round] || '').toUpperCase();
  document.getElementById('fm-group').textContent = groupLbl;

  // Predictions panel
  const grid = document.getElementById('fm-pred-grid');
  grid.innerHTML = PLAYERS.map(p => {
    const pred = getPrediction(p, m);
    const scoreStr = pred ? `${pred.home}–${pred.away}` : '<span style="color:var(--muted)">–</span>';
    return `<div class="fm-pred-cell">
      <div class="fm-pred-name">${p}</div>

    </div>`;
  }).join('');
}

async function loadContinue() {
  const name = document.getElementById('load-name').value;
  const pin = (document.getElementById('load-pin').value || '').trim();
  const status = document.getElementById('load-status');
  const btn = document.querySelector('.load-card .load-btn');
  if (!name) { status.innerHTML = '<div class="load-status err">Elegí tu nombre</div>'; return; }
  if (!/^\d{4,6}$/.test(pin)) { status.innerHTML = '<div class="load-status err">El PIN debe ser de 4 a 6 dígitos</div>'; return; }

  status.innerHTML = '<div class="load-status info">Verificando PIN…</div>';
  if (btn) btn.disabled = true;

  try {
    const res = await fetch('/api/predictions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verify', name, pin })
    });
    let data = {};
    try { data = await res.json(); } catch(e) {}
    if (res.status === 403) {
      status.innerHTML = '<div class="load-status err">PIN incorrecto</div>';
      if (btn) btn.disabled = false;
      return;
    }
    if (!res.ok) {
      status.innerHTML = `<div class="load-status err">${data.error || 'Error verificando'}</div>`;
      if (btn) btn.disabled = false;
      return;
    }
  } catch(e) {
    status.innerHTML = `<div class="load-status err">Error de red: ${e.message}</div>`;
    if (btn) btn.disabled = false;
    return;
  }

  loadAuth = { name, pin };
  saveLoadAuth(loadAuth);
  renderLoadTab();
}

function loadLogout() {
  loadAuth = {};
  saveLoadAuth(loadAuth);
  renderLoadTab();
}

async function loadSave() {
  const statusEl = document.getElementById('load-status');
  if (statusEl) statusEl.innerHTML = '<div class="load-status info">Guardando...</div>';

  const predictions = {};
  for (const m of KNOCKOUT_MATCHES) {
    const hEl = document.getElementById(`lh${m.match}`);
    const aEl = document.getElementById(`la${m.match}`);
    if (!hEl || !aEl || hEl.disabled) continue;
    const h = hEl.value.trim();
    const a = aEl.value.trim();
    if (h === '' || a === '') continue;
    const hn = parseInt(h, 10), an = parseInt(a, 10);
    if (isNaN(hn) || isNaN(an)) continue;
    predictions[m.match] = { home: hn, away: an };
  }

  if (Object.keys(predictions).length === 0) {
    if (statusEl) statusEl.innerHTML = '<div class="load-status err">No hay pronósticos para guardar</div>';
    return;
  }

  try {
    const res = await fetch('/api/predictions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: loadAuth.name, pin: loadAuth.pin, predictions })
    });
    let data = {};
    try { data = await res.json(); } catch(e) {}
    if (!res.ok) {
      if (statusEl) statusEl.innerHTML = `<div class="load-status err">${data.error || 'Error al guardar'}</div>`;
      if (res.status === 403) setTimeout(() => loadLogout(), 1800);
      return;
    }
    if (!userPredictions[loadAuth.name]) userPredictions[loadAuth.name] = {};
    Object.assign(userPredictions[loadAuth.name], predictions);
    if (statusEl) statusEl.innerHTML = `<div class="load-status ok">✓ ${Object.keys(predictions).length} pronóstico(s) guardado(s)</div>`;
    refresh();
  } catch(e) {
    if (statusEl) statusEl.innerHTML = `<div class="load-status err">Error de red: ${e.message}</div>`;
  }
}

function switchMatchView(view) {
  activeMatchView = view;
  document.querySelectorAll('.sub-tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`stb-${view}`).classList.add('active');
  if (view === 'groups') renderGroupFilters();
  renderMatchesAccordion();
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['standings','matches','players'][i]===name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'matches') { renderGroupFilters(); renderMatchesAccordion(); }
  if (name === 'players') renderPlayers();
}

// --- ROUTING (vista "Cargar" en /cargar) ---
let loadSyncing = false;

function isLoadRoute() {
  return window.location.pathname.startsWith('/cargar');
}

function snapshotLoadInputs() {
  const snap = {};
  for (const m of KNOCKOUT_MATCHES) {
    const hEl = document.getElementById(`lh${m.match}`);
    const aEl = document.getElementById(`la${m.match}`);
    if (!hEl || !aEl || hEl.disabled) continue;
    const h = hEl.value;
    const a = aEl.value;
    if (h !== '' || a !== '') snap[m.match] = { home: h, away: a };
  }
  return snap;
}
function restoreLoadInputs(snap) {
  for (const [matchNum, vals] of Object.entries(snap)) {
    const hEl = document.getElementById(`lh${matchNum}`);
    const aEl = document.getElementById(`la${matchNum}`);
    if (hEl && !hEl.disabled) hEl.value = vals.home;
    if (aEl && !aEl.disabled) aEl.value = vals.away;
  }
}

async function verifyStoredAuth() {
  if (!loadAuth.name || !loadAuth.pin) return;
  try {
    const r = await fetch('/api/predictions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verify', name: loadAuth.name, pin: loadAuth.pin })
    });
    if (r.status === 403) {
      loadAuth = {};
      saveLoadAuth(loadAuth);
    }
  } catch(e) { /* network failure → keep cached auth */ }
}

async function applyRoute() {
  const isLoad = isLoadRoute();
  document.body.classList.toggle('view-load', isLoad);
  window.scrollTo(0, 0);
  if (!isLoad) return;
  document.getElementById('tab-load').classList.add('active');

  await verifyStoredAuth();

  loadSyncing = true;
  renderLoadTab();
  const snap = snapshotLoadInputs();
  try { await syncResults(); } catch(e) { console.warn('sync error', e); }
  loadSyncing = false;
  renderLoadTab();
  restoreLoadInputs(snap);
}
function goToCargar(e) {
  if (e) e.preventDefault();
  history.pushState({}, '', '/cargar');
  applyRoute();
}
function goToHome(e) {
  if (e) e.preventDefault();
  history.pushState({}, '', '/');
  applyRoute();
}
window.addEventListener('popstate', applyRoute);

// --- SYNC with ESPN API ---

// Map ESPN English team names (normalized, no accents) → key matching Spanish names
const ESPN_TO_KEY = {
  'mexico': 'mexico', 'south africa': 'sudafrica', 'south korea': 'corea del sur',
  'czech republic': 'rep checa', 'czechia': 'rep checa',
  'canada': 'canada',
  'bosnia-herzegovina': 'bosnia', 'bosnia and herzegovina': 'bosnia', 'bosnia herzegovina': 'bosnia',
  'united states': 'estados unidos', 'usa': 'estados unidos', 'paraguay': 'paraguay',
  'qatar': 'catar', 'switzerland': 'suiza', 'brazil': 'brasil', 'morocco': 'marruecos',
  'haiti': 'haiti', 'scotland': 'escocia', 'australia': 'australia',
  'turkey': 'turquia', 'turkiye': 'turquia', 'türkiye': 'turquia',
  'germany': 'alemania',
  'curacao': 'curazao', 'curaçao': 'curazao',
  'netherlands': 'paises bajos', 'japan': 'japon',
  "cote d'ivoire": 'costa de marfil', 'ivory coast': 'costa de marfil',
  "cote divoire": 'costa de marfil',
  'ecuador': 'ecuador', 'sweden': 'suecia', 'tunisia': 'tunez',
  'spain': 'espana', 'belgium': 'belgica', 'saudi arabia': 'arabia saudita',
  'iran': 'iran', 'new zealand': 'nueva zelanda', 'france': 'francia',
  'senegal': 'senegal', 'iraq': 'irak', 'norway': 'noruega',
  'argentina': 'argentina', 'algeria': 'argelia', 'austria': 'austria',
  'jordan': 'jordania', 'portugal': 'portugal',
  'republic of the congo': 'rep del congo', 'congo': 'rep del congo',
  'congo dr': 'rep del congo', 'dr congo': 'rep del congo',
  'democratic republic of the congo': 'rep del congo',
  'england': 'inglaterra', 'croatia': 'croacia', 'ghana': 'ghana',
  'panama': 'panama', 'uzbekistan': 'uzbekistan', 'colombia': 'colombia',
  'cape verde': 'cabo verde', 'egypt': 'egipto', 'uruguay': 'uruguay',
};

function stripAccents(s) {
  return s.normalize('NFD').replace(/[̀-ͯ]/g, '');
}

// Normalize an ESPN English team name to a lookup key
function normalizeESPN(name) {
  if (!name) return '';
  return ESPN_TO_KEY[stripAccents(name.toLowerCase().trim())] || stripAccents(name.toLowerCase().trim());
}

// Normalize a Spanish team name (from MATCHES) to the same key space
function normalizeSpanish(name) {
  if (!name) return '';
  let n = stripAccents(name.toLowerCase().trim());
  n = n.replace(/^rep\. del /, 'rep del ').replace(/^rep\. /, 'rep ');
  n = n.replace(/bosnia y herzeg\.?/, 'bosnia');
  n = n.replace(/\bcorea del sur\b/, 'corea del sur');
  n = n.replace(/\bpaises bajos\b/, 'paises bajos');
  n = n.replace(/\bcosta de marfil\b/, 'costa de marfil');
  return n;
}

// Build lookup: "homeKey|awayKey" → match number
const MATCH_LOOKUP = (() => {
  const lkp = {};
  for (const m of MATCHES) {
    lkp[normalizeSpanish(m.home) + '|' + normalizeSpanish(m.away)] = m.match;
  }
  return lkp;
})();

function findMatchByTeams(homeESPN, awayESPN) {
  const hk = normalizeESPN(homeESPN);
  const ak = normalizeESPN(awayESPN);
  return MATCH_LOOKUP[hk + '|' + ak] || null;
}

async function fetchDateScores(dateStr) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dateStr}`;
  const res = await fetch(url);
  if (!res.ok) return [];
  const data = await res.json();
  const found = [];
  for (const ev of data.events || []) {
    const comps = ev.competitions?.[0]?.competitors || [];
    if (comps.length < 2) continue;
    const status = ev.competitions[0].status;
    const completed = status?.type?.completed === true;
    const inProgress = status?.type?.state === 'in';
    if (!completed && !inProgress) continue;
    const home = comps[0]?.team?.displayName || '';
    const away = comps[1]?.team?.displayName || '';
    const hs = parseInt(comps[0]?.score);
    const as_ = parseInt(comps[1]?.score);
    if (isNaN(hs) || isNaN(as_)) continue;
    const clock = status?.displayClock || '';
    found.push({ home, away, hs, as_, live: inProgress, clock });
  }
  return found;
}

async function syncResults() {
  const btn = document.getElementById('sync-btn');
  const statusEl = document.getElementById('sync-status');
  btn.disabled = true;
  btn.innerHTML = '⏳<span class="sync-text"> Sincronizando...</span>';
  statusEl.textContent = 'Buscando resultados...';

  const start = new Date('2026-06-11T00:00:00Z');
  const today = new Date();
  const dates = [];
  for (let d = new Date(start); d <= today; d.setUTCDate(d.getUTCDate() + 1)) {
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  }

  let updated = 0, liveCount = 0, unmatched = [];
  for (const dateStr of dates) {
    try {
      const found = await fetchDateScores(dateStr);
      for (const { home, away, hs, as_, live, clock } of found) {
        const mn = findMatchByTeams(home, away);
        if (mn) {
          results[mn] = { home: hs, away: as_, live: !!live, clock: clock || '' };
          updated++;
          if (live) liveCount++;
        } else {
          unmatched.push(`${home} vs ${away}`);
        }
      }
    } catch(e) {
      console.warn('Fetch error for', dateStr, e.message);
    }
  }

  if (unmatched.length) console.warn('Sin mapeo:', unmatched);
  saveResults(results);
  refresh();
  localStorage.setItem('prode_last_sync', Date.now());

  const t = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
  const liveLabel = liveCount > 0 ? ` · 🔴 ${liveCount} en vivo` : '';
  statusEl.textContent = `Sync: ${t} · ${updated} resultados${liveLabel}`;
  btn.disabled = false;
  btn.innerHTML = '↻<span class="sync-text"> Sincronizar resultados</span>';

  // Auto-refresca cada 60 segundos mientras haya partidos en vivo
  if (liveCount > 0) {
    setTimeout(() => syncResults(), 60000);
  }
}

// Auto-sync always on page load
window.addEventListener('load', () => syncResults());

// Init
async function init() {
  renderFeaturedMatch();
  renderStandings();
  renderGroupFilters();
  renderMatches();
  applyRoute();
  await fetchPredictions();
  refresh();
  if (isLoadRoute()) renderLoadTab();
}
init();
