<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prode Mundial 2026</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800;900&family=Barlow:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #f5f5f0;
    --surface: #ffffff;
    --surface2:#f0efea;
    --border:  #d8d6cf;
    --text:    #111111;
    --muted:   #777777;
    /* FWC 2026 signature neons – darkened for light-bg legibility */
    --coral:   #D6193C;
    --teal:    #007A6E;
    --violet:  #7B2CC0;
    --lime:    #5E9B00;
    /* bright neon versions for borders/shadows/backgrounds */
    --lime-neon:  #AAFF00;
    --teal-neon:  #00E5CC;
    --coral-neon: #FF4D6D;
    --violet-neon:#A855F7;
    /* group color aliases for JS interpolation */
    --gc0: #5E9B00;
    --gc1: #007A6E;
    --gc2: #D6193C;
    --gc3: #7B2CC0;
    --gold:    #B07800;
    /* scoring */
    --exact:   var(--lime);
    --result:  var(--teal);
    --miss:    var(--coral);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Barlow', system-ui, sans-serif;
    min-height: 100vh;
  }

  /* ── HEADER ── */
  header {
    background: #fff;
    border-bottom: 3px solid #111;
    padding: 0 24px;
    display: flex; align-items: stretch; gap: 0;
    position: relative; overflow: hidden;
  }
  .header-deco {
    position: absolute; right: 0; top: -10px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 14rem; font-weight: 900; line-height: 1;
    color: #00000008; pointer-events: none; user-select: none;
    letter-spacing: -8px;
  }
  .header-left {
    display: flex; align-items: center; gap: 20px;
    padding: 20px 0; flex: 1;
  }
  .header-trophy { font-size: 2.4rem; }
  .header-title { }
  .header-title h1 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2rem; font-weight: 900; letter-spacing: 2px;
    text-transform: uppercase; line-height: 1;
  }
  .header-title h1 .wc { color: var(--lime); }
  .header-title p {
    font-size: 0.78rem; color: var(--muted); margin-top: 4px;
    text-transform: uppercase; letter-spacing: 2px;
  }
  .sync-area {
    display: flex; flex-direction: column; align-items: flex-end;
    justify-content: center; gap: 5px; padding: 20px 0 20px 24px;
    position: relative; z-index: 1;
  }
  .sync-btn {
    padding: 9px 18px;
    background: #fff; border: 2px solid var(--teal); border-radius: 2px;
    color: var(--teal); font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700; font-size: 0.9rem; letter-spacing: 1px;
    text-transform: uppercase; cursor: pointer;
    box-shadow: 3px 3px 0 var(--teal);
    transition: box-shadow 0.15s, transform 0.15s;
    white-space: nowrap;
  }
  .sync-btn:hover { box-shadow: 5px 5px 0 var(--teal); transform: translate(-1px,-1px); }
  .sync-btn:active { box-shadow: 1px 1px 0 var(--teal); transform: translate(2px,2px); }
  .sync-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
  .sync-status { font-size: 0.7rem; color: var(--muted); letter-spacing: 1px; }

  /* ── CONTAINER / TABS ── */
  .container { max-width: 1400px; margin: 0 auto; padding: 28px 16px; }

  .tabs { display: flex; gap: 2px; margin-bottom: 28px; border-bottom: 2px solid var(--border); }
  .tab-btn {
    padding: 10px 22px;
    background: none; border: none;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 700; letter-spacing: 1px;
    text-transform: uppercase; color: var(--muted);
    cursor: pointer; border-bottom: 3px solid transparent;
    margin-bottom: -2px; transition: all 0.15s;
  }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--lime-neon); }
  .tab-btn:hover:not(.active) { color: #333; }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  /* ── LEADERBOARD ── */
  .leaderboard { background: var(--surface); border: 2px solid var(--border); border-radius: 0; overflow: hidden; }
  .leaderboard-header {
    padding: 12px 20px;
    background: var(--surface2);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 2px;
    display: grid; grid-template-columns: 52px 1fr repeat(4, 90px); gap: 8px; align-items: center;
    border-bottom: 2px solid var(--border);
  }
  .lb-row {
    display: grid; grid-template-columns: 52px 1fr repeat(4, 90px); gap: 8px;
    align-items: center; padding: 14px 20px; border-bottom: 1px solid var(--border);
    transition: background 0.1s; position: relative;
  }
  .lb-row:last-child { border-bottom: none; }
  .lb-row:hover { background: var(--surface2); }
  .lb-row.rank-1 { border-left: 4px solid var(--lime-neon); }
  .lb-row.rank-2 { border-left: 4px solid var(--teal-neon); }
  .lb-row.rank-3 { border-left: 4px solid var(--coral-neon); }
  .lb-row.rank-other { border-left: 4px solid var(--border); }

  .lb-rank {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.5rem; font-weight: 900; color: var(--muted); text-align: center;
  }
  .lb-row.rank-1 .lb-rank { color: var(--lime); }
  .lb-row.rank-2 .lb-rank { color: var(--teal); }
  .lb-row.rank-3 .lb-rank { color: var(--coral); }

  .lb-name-wrap {}
  .lb-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.3rem; font-weight: 800; text-transform: uppercase; letter-spacing: 1px;
  }
  .lb-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.4rem; font-weight: 900; color: var(--lime); text-align: center;
  }
  .lb-exact { color: var(--exact); font-weight: 700; text-align: center; font-size: 1rem; }
  .lb-result { color: var(--result); font-weight: 700; text-align: center; font-size: 1rem; }
  .lb-played { color: var(--muted); font-weight: 600; text-align: center; font-size: 0.9rem; }

  .progress-bar { height: 3px; background: var(--border); margin-top: 6px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--lime-neon); transition: width 0.5s; }

  /* ── GROUPS ── */
  .group-section { margin-bottom: 36px; }
  .group-title { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .group-badge {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 900; letter-spacing: 1px;
    width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
    border: 2px solid; border-radius: 0;
  }
  .group-title h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.1rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase;
  }

  /* Group colors cycling through the 4 neons */
  .gc-0 { color: var(--lime); border-color: var(--lime-neon); box-shadow: 3px 3px 0 var(--lime-neon); }
  .gc-1 { color: var(--teal); border-color: var(--teal-neon); box-shadow: 3px 3px 0 var(--teal-neon); }
  .gc-2 { color: var(--coral); border-color: var(--coral-neon); box-shadow: 3px 3px 0 var(--coral-neon); }
  .gc-3 { color: var(--violet); border-color: var(--violet-neon); box-shadow: 3px 3px 0 var(--violet-neon); }
  .gh-0 { color: var(--lime); }
  .gh-1 { color: var(--teal); }
  .gh-2 { color: var(--coral); }
  .gh-3 { color: var(--violet); }

  /* ── MATCH CARDS ── */
  .match-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 0; margin-bottom: 6px; overflow: hidden;
  }
  .match-header {
    display: flex; align-items: center;
    gap: 8px; padding: 11px 14px; cursor: pointer;
    transition: background 0.1s;
  }
  .match-header:hover { background: var(--surface2); }
  .match-num {
    color: var(--muted); font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.75rem; font-weight: 700; min-width: 24px; text-align: center;
  }
  .team-home {
    flex: 1; text-align: right;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .team-away {
    flex: 1; text-align: left;
    font-family: 'Barlow Condensed', sans-serif; font-weight: 700; font-size: 1rem;
    text-transform: uppercase; letter-spacing: 0.5px;
  }
  .score-area { display: flex; align-items: center; gap: 6px; justify-content: center; margin: 0 8px; }
  .score-input {
    width: 40px; height: 34px;
    background: var(--surface2); border: 1px solid var(--border);
    color: var(--text); font-size: 1rem; font-weight: 700;
    font-family: 'Barlow Condensed', sans-serif;
    text-align: center; outline: none; border-radius: 0;
    transition: border-color 0.15s;
  }
  .score-input:focus { border-color: var(--lime-neon); }
  .score-sep { color: var(--muted); font-weight: 900; font-size: 1.1rem; }
  .match-result-display {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.3rem; font-weight: 900; color: var(--text);
    text-align: center; min-width: 70px; letter-spacing: 2px;
    margin: 0 8px;
  }
  .match-meta { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .match-status {
    padding: 3px 8px; font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
  }
  .match-status.pending { border: 1px solid var(--border); color: var(--muted); }
  .match-status.played { border: 1px solid var(--lime); color: var(--lime); background: #f0ffe0; }
  .chevron { color: var(--muted); font-size: 0.75rem; transition: transform 0.2s; }
  .chevron.open { transform: rotate(180deg); }

  /* ── PREDICTIONS PANEL ── */
  .predictions-panel {
    display: none; padding: 10px 14px 12px;
    border-top: 1px solid var(--border); background: var(--surface2);
  }
  .predictions-panel.open { display: block; }
  .pred-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 6px; }
  .pred-cell {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 0; padding: 8px 10px; text-align: center; transition: border-color 0.15s;
  }
  .pred-player {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.65rem; font-weight: 700; color: var(--muted);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 3px;
  }
  .pred-score {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 800; letter-spacing: 2px;
  }
  .pred-pts { font-size: 0.65rem; margin-top: 3px; font-weight: 700; letter-spacing: 0.5px; }

  .pts-2 { border-color: var(--lime-neon) !important; box-shadow: 2px 2px 0 var(--lime-neon); background: #f5ffe0; }
  .pts-2 .pred-score { color: var(--lime); }
  .pts-2 .pred-pts { color: var(--lime); }
  .pts-1 { border-color: var(--teal-neon) !important; box-shadow: 2px 2px 0 var(--teal-neon); background: #e8fdf9; }
  .pts-1 .pred-score { color: var(--teal); }
  .pts-1 .pred-pts { color: var(--teal); }
  .pts-0 .pred-pts { color: var(--coral); }

  /* ── SUB-TABS (within Partidos) ── */
  .sub-tabs { display: flex; gap: 6px; margin-bottom: 16px; }
  .sub-tab-btn {
    padding: 6px 18px;
    background: var(--surface); border: 1.5px solid var(--border);
    color: var(--muted); cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.88rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    border-radius: 0; transition: all 0.15s;
  }
  .sub-tab-btn.active { background: var(--text); border-color: var(--text); color: var(--bg); }
  .sub-tab-btn:hover:not(.active) { border-color: #aaa; color: var(--text); }

  .chrono-day { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
  .chrono-day h2 {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1rem; font-weight: 800; letter-spacing: 2px;
    text-transform: uppercase; color: var(--text);
  }

  /* ── FILTER BAR ── */
  .filter-bar { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .filter-btn {
    padding: 5px 14px; background: var(--surface); border: 1px solid var(--border);
    color: var(--muted); cursor: pointer;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.85rem; font-weight: 700; letter-spacing: 1px; text-transform: uppercase;
    transition: all 0.15s; border-radius: 0;
  }
  .filter-btn.active {
    background: var(--lime-neon); border-color: var(--lime-neon); color: #000;
    box-shadow: 3px 3px 0 rgba(170,255,0,0.5);
  }
  .filter-btn:hover:not(.active) { border-color: #aaa; color: var(--text); }

  /* ── PLAYER VIEW ── */
  .player-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 10px; margin-bottom: 24px; }
  .player-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 0; padding: 16px; cursor: pointer;
    transition: all 0.15s; text-align: center; position: relative;
  }
  .player-card:hover { border-color: #aaa; box-shadow: 4px 4px 0 var(--teal-neon); }
  .player-card.selected { border-color: var(--lime-neon); box-shadow: 4px 4px 0 var(--lime-neon); }
  .p-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 1.2rem; font-weight: 900; text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 8px;
  }
  .p-pts {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 2.2rem; font-weight: 900; color: var(--lime); line-height: 1;
  }
  .p-pts-label { font-size: 0.7rem; color: var(--muted); text-transform: uppercase; letter-spacing: 2px; margin-bottom: 8px; }
  .p-stats { font-size: 0.75rem; color: var(--muted); margin-top: 6px; }

  .player-matches { background: var(--surface); border: 1px solid var(--border); overflow: hidden; }
  .pm-row {
    display: grid; grid-template-columns: 36px 1fr auto 1fr 80px 80px;
    gap: 8px; padding: 9px 14px; border-bottom: 1px solid var(--border);
    font-size: 0.85rem; align-items: center;
  }
  .pm-row:last-child { border-bottom: none; }
  .pm-row.header {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.7rem; color: var(--muted); font-weight: 700;
    text-transform: uppercase; letter-spacing: 1px;
    background: var(--surface2); padding: 10px 14px;
  }
  .pm-pts { text-align: center; font-weight: 800; }
  .pm-pred {
    font-family: 'Barlow Condensed', sans-serif;
    text-align: center; font-weight: 800; font-size: 1rem; letter-spacing: 2px;
  }

  .badge-2 { display:inline-block; background: #edffc0; color: var(--lime); padding: 3px 10px; border: 1px solid var(--lime-neon); font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:0.85rem; }
  .badge-1 { display:inline-block; background: #d4faf5; color: var(--teal); padding: 3px 10px; border: 1px solid var(--teal-neon); font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:0.85rem; }
  .badge-0 { display:inline-block; background: #fde8ec; color: var(--coral); padding: 3px 10px; border: 1px solid var(--coral-neon); font-family:'Barlow Condensed',sans-serif; font-weight:800; font-size:0.85rem; }
  .badge-p { display:inline-block; background: var(--surface2); color: var(--muted); padding: 3px 10px; font-family:'Barlow Condensed',sans-serif; font-weight:700; font-size:0.85rem; }

  .legend {
    margin-top: 14px; color: var(--muted); font-size: 0.75rem; padding: 0 2px;
    letter-spacing: 0.5px;
  }
  .legend span { margin-right: 16px; }
  .legend .l2 { color: var(--lime); }
  .legend .l1 { color: var(--teal); }
  .legend .l0 { color: var(--coral); }

  .match-date-row {
    padding: 0 10px 6px 42px;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 0.68rem; color: var(--muted);
    letter-spacing: 0.5px; text-transform: uppercase;
  }

  @media (max-width: 768px) {
    /* Header */
    header { padding: 0 12px; }
    .header-deco { display: none; }
    .header-left { gap: 10px; padding: 12px 0; }
    .header-trophy { font-size: 1.6rem; }
    .header-title h1 { font-size: 1.15rem; }
    .header-title p { display: none; }
    .sync-area { padding: 12px 0 12px 10px; }
    .sync-text { display: none; }
    .sync-btn { padding: 8px 10px; font-size: 0.8rem; letter-spacing: 0; }
    .sync-status { display: none; }

    /* Tabs */
    .tabs { overflow-x: auto; gap: 0; }
    .tab-btn { padding: 10px 14px; font-size: 0.85rem; white-space: nowrap; }

    /* Leaderboard */
    .leaderboard-header, .lb-row { grid-template-columns: 36px 1fr 54px 54px; gap: 6px; }
    .leaderboard-header .h-played, .lb-played { display: none; }
    .leaderboard-header .h-result, .lb-result { display: none; }
    .lb-pts { font-size: 1.1rem; }
    .lb-rank { font-size: 1.2rem; }

    /* Match cards */
    .match-header { padding: 9px 10px; gap: 5px; }
    .team-home, .team-away {
      font-size: 0.75rem; overflow: hidden;
      text-overflow: ellipsis; white-space: nowrap;
    }
    .match-result-display { font-size: 1.05rem; min-width: 50px; }
    .score-input { width: 28px; height: 28px; font-size: 0.85rem; }
    .score-area { gap: 3px; margin: 0 4px; }
    .match-meta { gap: 3px; }
    .match-status.pending { display: none; }
    .match-status.played { font-size: 0.58rem; padding: 2px 5px; }
    .match-date-row { padding-left: 30px; }
    .match-num { min-width: 20px; font-size: 0.7rem; }

    /* Player view */
    .pm-row { grid-template-columns: 28px 1fr auto 1fr 50px 50px; gap: 4px; font-size: 0.78rem; }
  }
</style>
</head>
<body>

<header>
  <div class="header-deco">26</div>
  <div class="header-left">
    <div class="header-trophy">⚽</div>
    <div class="header-title">
      <h1>PRODE <span class="wc">MUNDIAL 2026</span></h1>
      <p>Fase de Grupos &nbsp;·&nbsp; 72 partidos</p>
    </div>
  </div>
  <div class="sync-area">
    <button class="sync-btn" id="sync-btn" onclick="syncResults()">↻<span class="sync-text"> Sincronizar resultados</span></button>
    <span class="sync-status" id="sync-status">Última sync: nunca</span>
  </div>
</header>

<div class="container">
  <div class="tabs">
    <button class="tab-btn active" onclick="switchTab('standings')">Posiciones</button>
    <button class="tab-btn" onclick="switchTab('matches')">Partidos</button>
    <button class="tab-btn" onclick="switchTab('players')">Jugadores</button>
  </div>

  <!-- STANDINGS TAB -->
  <div id="tab-standings" class="tab-panel active">
    <div class="leaderboard">
      <div class="leaderboard-header">
        <div>#</div>
        <div>Jugador</div>
        <div style="text-align:center">Puntos</div>
        <div style="text-align:center">Exactos</div>
        <div style="text-align:center" class="h-result">Resultado</div>
        <div style="text-align:center" class="h-played">Jugados</div>
      </div>
      <div id="lb-body"></div>
    </div>
    <div class="legend">
      <span class="l2">■ +2 pts — Exacto (goles correctos)</span>
      <span class="l1">■ +1 pt — Resultado correcto (ganador/empate)</span>
      <span class="l0">■ 0 pts — Sin puntos</span>
    </div>
  </div>

  <!-- MATCHES TAB -->
  <div id="tab-matches" class="tab-panel">
    <div class="sub-tabs">
      <button class="sub-tab-btn active" id="stb-groups" onclick="switchMatchView('groups')">Por Grupo</button>
      <button class="sub-tab-btn" id="stb-chrono" onclick="switchMatchView('chrono')">Cronológico</button>
    </div>
    <div id="group-filters-wrap">
      <div class="filter-bar" id="group-filters">
        <button class="filter-btn active" onclick="filterGroup('all', this)">Todos</button>
      </div>
    </div>
    <div id="matches-container"></div>
  </div>

  <!-- PLAYERS TAB -->
  <div id="tab-players" class="tab-panel">
    <div class="player-grid" id="player-grid"></div>
    <div id="player-detail"></div>
  </div>
</div>

function formatMatchDate(matchNum) {
  const iso = MATCH_DATES[matchNum];
  if (!iso) return '';
  const d = new Date(iso);
  return d.toLocaleString('es-ES', {
    timeZone: 'Europe/Madrid',
    weekday: 'short', day: 'numeric', month: 'short',
    hour: '2-digit', minute: '2-digit'
  });
}

// Load/save results from localStorage
function loadResults() {
  try { return JSON.parse(localStorage.getItem('prode_results') || '{}'); } catch(e) { return {}; }
}
function saveResults(results) {
  localStorage.setItem('prode_results', JSON.stringify(results));
}

let results = loadResults();
let activeGroup = 'all';
let activeMatchView = 'groups';
let selectedPlayer = null;

function getResult(matchNum) {
  return results[matchNum] || null;
}

function getOutcome(h, a) {
  if (h > a) return 'H';
  if (a > h) return 'A';
  return 'D';
}

function calcPoints(pred, actual) {
  if (!actual) return null;
  if (pred.home === actual.home && pred.away === actual.away) return 2;
  if (getOutcome(pred.home, pred.away) === getOutcome(actual.home, actual.away)) return 1;
  return 0;
}

function calcPlayerStats(player) {
  let pts = 0, exact = 0, result = 0, played = 0;
  for (const m of MATCHES) {
    const actual = getResult(m.match);
    if (!actual) continue;
    played++;
    const pred = m.predictions[player];
    const p = calcPoints(pred, actual);
    pts += p;
    if (p === 2) exact++;
    else if (p === 1) result++;
  }
  return { pts, exact, result, played };
}

const GROUP_COLOR = { A:0, B:1, C:2, D:3, E:0, F:1, G:2, H:3, I:0, J:1, K:2, L:3 };

function renderStandings() {
  const stats = PLAYERS.map(p => ({ name: p, ...calcPlayerStats(p) }));
  stats.sort((a, b) => b.pts - a.pts || b.exact - a.exact || b.result - a.result);

  const body = document.getElementById('lb-body');
  body.innerHTML = stats.map((s, i) => {
    const rowCls = i === 0 ? 'rank-1' : i === 1 ? 'rank-2' : i === 2 ? 'rank-3' : 'rank-other';
    const rankLabel = i === 0 ? '01' : i === 1 ? '02' : i === 2 ? '03' : String(i+1).padStart(2,'0');
    const pct = MATCHES.length > 0 ? (s.played / MATCHES.length * 100).toFixed(0) : 0;
    return `<div class="lb-row ${rowCls}">
      <div class="lb-rank">${rankLabel}</div>
      <div class="lb-name-wrap">
        <div class="lb-name">${s.name}</div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <div class="lb-pts">${s.pts}</div>
      <div class="lb-exact">${s.exact}</div>
      <div class="lb-result">${s.result}</div>
      <div class="lb-played h-played">${s.played}/${MATCHES.length}</div>
    </div>`;
  }).join('');
}

function renderMatches() {
  const container = document.getElementById('matches-container');
  const groups = activeGroup === 'all' ? GROUPS : [activeGroup];
  container.innerHTML = groups.map(g => {
    const ci = GROUP_COLOR[g];
    const gMatches = MATCHES.filter(m => m.group === g);
    return `<div class="group-section">
      <div class="group-title">
        <div class="group-badge gc-${ci}">${g}</div>
        <h2 class="gh-${ci}">GRUPO ${g}</h2>
      </div>
      ${gMatches.map(m => renderMatchCard(m, ci)).join('')}
    </div>`;
  }).join('');
}

function renderMatchCard(m, ci) {
  const actual = getResult(m.match);
  const isPlayed = !!actual;

  const scoreBlock = isPlayed
    ? `<div class="match-result-display">${actual.home} – ${actual.away}</div>`
    : `<div class="score-area">
        <input class="score-input" type="number" min="0" max="20" placeholder="–"
          id="h${m.match}" onclick="event.stopPropagation()" onchange="saveScore(${m.match})">
        <span class="score-sep">–</span>
        <input class="score-input" type="number" min="0" max="20" placeholder="–"
          id="a${m.match}" onclick="event.stopPropagation()" onchange="saveScore(${m.match})">
      </div>`;

  const predRows = PLAYERS.map(p => {
    const pred = m.predictions[p];
    const pts = calcPoints(pred, actual);
    const cls = pts === null ? '' : pts === 2 ? 'pts-2' : pts === 1 ? 'pts-1' : 'pts-0';
    const lbl = pts === null ? '' : pts === 2 ? '+2 EXACTO' : pts === 1 ? '+1 RESULT.' : '0 PTS';
    return `<div class="pred-cell ${cls}">
      <div class="pred-player">${p}</div>
      <div class="pred-score">${pred.home}–${pred.away}</div>
      <div class="pred-pts">${lbl}</div>
    </div>`;
  }).join('');

  const statusCls = isPlayed ? 'played' : 'pending';
  const statusTxt = isPlayed ? '✓ JUGADO' : 'PENDIENTE';
  const whenStr = !isPlayed ? formatMatchDate(m.match) : '';

  return `<div class="match-card" id="mc${m.match}" style="border-left: 3px solid var(--gc${ci})">
    <div class="match-header" onclick="togglePreds(${m.match})">
      <div class="match-num">${m.match}</div>
      <div class="team-home">${m.home}</div>
      ${scoreBlock}
      <div class="team-away">${m.away}</div>
      <div class="match-meta">
        <span class="match-status ${statusCls}">${statusTxt}</span>
        <span class="chevron" id="chev${m.match}">▼</span>
      </div>
    </div>
    ${whenStr ? `<div class="match-date-row">📅 ${whenStr}</div>` : ''}
    <div class="predictions-panel" id="pp${m.match}">
      <div class="pred-grid">${predRows}</div>
    </div>
  </div>`;
}

function togglePreds(matchNum) {
  const panel = document.getElementById(`pp${matchNum}`);
  const chev = document.getElementById(`chev${matchNum}`);
  const open = panel.classList.toggle('open');
  chev.classList.toggle('open', open);
}

function saveScore(matchNum) {
  const hEl = document.getElementById(`h${matchNum}`);
  const aEl = document.getElementById(`a${matchNum}`);
  if (!hEl || !aEl) return;
  const h = hEl.value.trim();
  const a = aEl.value.trim();
  if (h !== '' && a !== '') {
    results[matchNum] = { home: parseInt(h), away: parseInt(a) };
  } else {
    delete results[matchNum];
  }
  saveResults(results);
  refresh();
}

function renderChronoMatches() {
  const container = document.getElementById('matches-container');
  const sorted = [...MATCHES].sort((a, b) => {
    const da = MATCH_DATES[a.match] ? new Date(MATCH_DATES[a.match]) : new Date(0);
    const db = MATCH_DATES[b.match] ? new Date(MATCH_DATES[b.match]) : new Date(0);
    return da - db;
  });

  const byDay = {};
  const dayOrder = [];
  for (const m of sorted) {
    const iso = MATCH_DATES[m.match];
    const d = iso ? new Date(iso) : null;
    const dayKey = d
      ? d.toLocaleDateString('es-ES', { timeZone: 'Europe/Madrid', weekday: 'long', day: 'numeric', month: 'long' })
      : 'Sin fecha';
    if (!byDay[dayKey]) { byDay[dayKey] = []; dayOrder.push(dayKey); }
    byDay[dayKey].push(m);
  }

  container.innerHTML = dayOrder.map(day => {
    const dayMatches = byDay[day];
    return `<div class="group-section">
      <div class="chrono-day"><h2>${day}</h2></div>
      ${dayMatches.map(m => renderMatchCard(m, GROUP_COLOR[m.group])).join('')}
    </div>`;
  }).join('');
}

function switchTab(name) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', ['standings','matches','players'][i]===name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(`tab-${name}`).classList.add('active');
  if (name === 'matches') {
    if (activeMatchView === 'groups') { renderGroupFilters(); renderMatches(); }
    else renderChronoMatches();
  }
  if (name === 'players') renderPlayers();
}

// --- SYNC with ESPN API ---

// Map ESPN English team names (normalized, no accents) → key matching Spanish names
const ESPN_TO_KEY = {
  'mexico': 'mexico', 'south africa': 'sudafrica', 'south korea': 'corea del sur',
  'czech republic': 'rep checa', 'czechia': 'rep checa',
  'canada': 'canada',
  'bosnia-herzegovina': 'bosnia', 'bosnia and herzegovina': 'bosnia', 'bosnia herzegovina': 'bosnia',
  'united states': 'estados unidos', 'usa': 'estados unidos', 'paraguay': 'paraguay',
  'qatar': 'catar', 'switzerland': 'suiza', 'brazil': 'brasil', 'morocco': 'marruecos',
  'haiti': 'haiti', 'scotland': 'escocia', 'australia': 'australia',
  'turkey': 'turquia', 'turkiye': 'turquia', 'türkiye': 'turquia',
  'germany': 'alemania',
  'curacao': 'curazao', 'curaçao': 'curazao',
  'netherlands': 'paises bajos', 'japan': 'japon',
  "cote d'ivoire": 'costa de marfil', 'ivory coast': 'costa de marfil',
  "cote divoire": 'costa de marfil',
  'ecuador': 'ecuador', 'sweden': 'suecia', 'tunisia': 'tunez',
  'spain': 'espana', 'belgium': 'belgica', 'saudi arabia': 'arabia saudita',
  'iran': 'iran', 'new zealand': 'nueva zelanda', 'france': 'francia',
  'senegal': 'senegal', 'iraq': 'irak', 'norway': 'noruega',
  'argentina': 'argentina', 'algeria': 'argelia', 'austria': 'austria',
  'jordan': 'jordania', 'portugal': 'portugal',
  'republic of the congo': 'rep del congo', 'congo': 'rep del congo',
  'dr congo': 'rep del congo', 'democratic republic of the congo': 'rep del congo',
  'england': 'inglaterra', 'croatia': 'croacia', 'ghana': 'ghana',
  'panama': 'panama', 'uzbekistan': 'uzbekistan', 'colombia': 'colombia',
  'cape verde': 'cabo verde', 'egypt': 'egipto', 'uruguay': 'uruguay',
};

function stripAccents(s) {
  return s.normalize('NFD').replace(/[̀-ͯ]/g, '');
}

// Normalize an ESPN English team name to a lookup key
function normalizeESPN(name) {
  if (!name) return '';
  return ESPN_TO_KEY[stripAccents(name.toLowerCase().trim())] || stripAccents(name.toLowerCase().trim());
}

// Normalize a Spanish team name (from MATCHES) to the same key space
function normalizeSpanish(name) {
  if (!name) return '';
  let n = stripAccents(name.toLowerCase().trim());
  n = n.replace(/^rep\. del /, 'rep del ').replace(/^rep\. /, 'rep ');
  n = n.replace(/bosnia y herzeg\.?/, 'bosnia');
  n = n.replace(/\bcorea del sur\b/, 'corea del sur');
  n = n.replace(/\bpaises bajos\b/, 'paises bajos');
  n = n.replace(/\bcosta de marfil\b/, 'costa de marfil');
  return n;
}

// Build lookup: "homeKey|awayKey" → match number
const MATCH_LOOKUP = (() => {
  const lkp = {};
  for (const m of MATCHES) {
    lkp[normalizeSpanish(m.home) + '|' + normalizeSpanish(m.away)] = m.match;
  }
  return lkp;
})();

function findMatchByTeams(homeESPN, awayESPN) {
  const hk = normalizeESPN(homeESPN);
  const ak = normalizeESPN(awayESPN);
  return MATCH_LOOKUP[hk + '|' + ak] || null;
}

async function fetchDateScores(dateStr) {
  const url = `https://site.api.espn.com/apis/site/v2/sports/soccer/fifa.world/scoreboard?dates=${dateStr}`;
  const res = await fetch(url);
  if (!res.ok) return [];
  const data = await res.json();
  const found = [];
  for (const ev of data.events || []) {
    const comps = ev.competitions?.[0]?.competitors || [];
    if (comps.length < 2) continue;
    const completed = ev.competitions[0].status?.type?.completed === true;
    if (!completed) continue;
    const home = comps[0]?.team?.displayName || '';
    const away = comps[1]?.team?.displayName || '';
    const hs = parseInt(comps[0]?.score);
    const as_ = parseInt(comps[1]?.score);
    if (isNaN(hs) || isNaN(as_)) continue;
    found.push({ home, away, hs, as_ });
  }
  return found;
}

async function syncResults() {
  const btn = document.getElementById('sync-btn');
  const statusEl = document.getElementById('sync-status');
  btn.disabled = true;
  btn.innerHTML = '⏳<span class="sync-text"> Sincronizando...</span>';
  statusEl.textContent = 'Buscando resultados...';

  const start = new Date('2026-06-11T00:00:00Z');
  const today = new Date();
  const dates = [];
  for (let d = new Date(start); d <= today; d.setUTCDate(d.getUTCDate() + 1)) {
    dates.push(d.toISOString().slice(0,10).replace(/-/g,''));
  }

  let updated = 0, unmatched = [];
  for (const dateStr of dates) {
    try {
      const found = await fetchDateScores(dateStr);
      for (const { home, away, hs, as_ } of found) {
        const mn = findMatchByTeams(home, away);
        if (mn) {
          results[mn] = { home: hs, away: as_ };
          updated++;
        } else {
          unmatched.push(`${home} vs ${away}`);
        }
      }
    } catch(e) {
      console.warn('Fetch error for', dateStr, e.message);
    }
  }

  if (unmatched.length) console.warn('Sin mapeo:', unmatched);
  saveResults(results);
  refresh();
  localStorage.setItem('prode_last_sync', Date.now());

  const t = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit' });
  statusEl.textContent = `Sync: ${t} · ${updated} resultados`;
  btn.disabled = false;
  btn.innerHTML = '↻<span class="sync-text"> Sincronizar resultados</span>';
}

// Auto-sync always on page load
window.addEventListener('load', () => syncResults());

// Init
renderStandings();
renderGroupFilters();
renderMatches();
</script>
